services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: incident-agent-pgvector
    environment:
      POSTGRES_DB: incidents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      # Spring AI creates the schema itself (initialize-schema: true); this only
      # gates readiness so the app doesn't race the DB on startup.
      test: ["CMD-SHELL", "pg_isready -U postgres -d incidents"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector-data:
